<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspberry Pi Provisioning Dashboard</title>
    <style>
        :root {
            --primary: #0070f3;
            --primary-hover: #0051cb;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 400px;
            width: 100%;
        }

        h1 { font-size: 22px; text-align: center; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; text-align: center; margin-bottom: 24px; }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a5568;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .btn-connect { background-color: var(--primary); color: white; }
        .btn-connect:hover { background-color: var(--primary-hover); }
        .btn-connect:disabled { background-color: #eaeaea; color: #999; cursor: not-allowed; }

        .btn-action { background-color: #2d3748; color: white; }
        .btn-action:hover:not(:disabled) { background-color: #1a202c; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-secondary { background-color: #e2e8f0; color: #4a5568; }
        .btn-secondary:hover:not(:disabled) { background-color: #cbd5e0; }

        hr { border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0; }

        #status {
            margin-top: 20px;
            padding: 10px;
            background: #f7fafc;
            border-radius: 6px;
            font-size: 13px;
            color: #4a5568;
            border-left: 4px solid #cbd5e0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pi Setup Dashboard</h1>
        <p>Provision Wi-Fi and manage credentials over BLE.</p>

        <!-- Connection -->
        <button id="connectBtn" class="btn btn-connect">Connect to Pi</button>
        
        <hr>

        <!-- Device Info Info Section -->
        <div class="form-group">
            <button id="readDevIdBtn" class="btn btn-secondary" disabled>Read Device ID</button>
            <div id="devIdDisplay" style="font-size: 13px; color:#718096; text-align:center; margin-top:2px;">Device ID: Unknown</div>
        </div>

        <hr>

        <!-- Wi-Fi Provisioning Form -->
        <div class="form-group">
            <label for="wifiSsid">Wi-Fi Network Name (SSID)</label>
            <input type="text" id="wifiSsid" placeholder="e.g. Home_Network" disabled>
        </div>

        <div class="form-group">
            <label for="wifiPass">Wi-Fi Password</label>
            <input type="password" id="wifiPass" placeholder="••••••••" disabled>
        </div>

        <button id="sendWifiBtn" class="btn btn-action" disabled>Save Wi-Fi Configuration</button>
        <button id="readStatusBtn" class="btn btn-secondary" disabled>Check Pi Connection Status</button>

        <!-- Dynamic Feedback Logs -->
        <div id="status">Status: Disconnected</div>
    </div>

    <script>
        // --- Configuration Parameters ---
        const DEVICE_NAME = 'AIREM_SETUP'; 
        const SERVICE_UUID = 'a1230000-5555-4444-3333-222211110000';

        // Custom individual Characteristic UUIDs (Must map perfectly to your Python script)
        const CHAR_SSID_UUID   = 'a1230000-5555-4444-3333-222211110000'; // Write
        const CHAR_PASS_UUID   = 'a1230000-5555-4444-3333-222211110000'; // Write
        const CHAR_STATUS_UUID = 'a1230000-5555-4444-3333-222211110000'; // Read (or Notify)
        const CHAR_DEVID_UUID  = 'a1230000-5555-4444-3333-222211110000'; // Read

        // JavaScript pipeline storage objects
        let bleDevice = null;
        let characteristicsMap = {};

        // UI Element Selectors
        const connectBtn = document.getElementById('connectBtn');
        const sendWifiBtn = document.getElementById('sendWifiBtn');
        const readStatusBtn = document.getElementById('readStatusBtn');
        const readDevIdBtn = document.getElementById('readDevIdBtn');
        const wifiSsidInput = document.getElementById('wifiSsid');
        const wifiPassInput = document.getElementById('wifiPass');
        const statusDiv = document.getElementById('status');
        const devIdDisplay = document.getElementById('devIdDisplay');

        // Connect Handshake Logic
        connectBtn.addEventListener('click', async () => {
            try {
                updateStatus(`Scanning for device named "${DEVICE_NAME}"...`);
                
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: DEVICE_NAME }],
                    optionalServices: [SERVICE_UUID] 
                });

                updateStatus(`Found device. Connecting to GATT server...`);
                const server = await bleDevice.gatt.connect();

                updateStatus("Fetching BLE Primary Service profile...");
                const service = await server.getPrimaryService(SERVICE_UUID);

                // Fetch and resolve all 4 characteristic endpoints simultaneously
                updateStatus("Resolving characteristic security lanes...");
                characteristicsMap['ssid']   = await service.getCharacteristic(CHAR_SSID_UUID);
                characteristicsMap['pass']   = await service.getCharacteristic(CHAR_PASS_UUID);
                characteristicsMap['status'] = await service.getCharacteristic(CHAR_STATUS_UUID);
                characteristicsMap['devid']  = await service.getCharacteristic(CHAR_DEVID_UUID);

                // Unlock inputs and actionable UI elements
                updateStatus(`Connected securely to ${bleDevice.name}!`);
                setUiAccent("#48bb78"); // green
                
                wifiSsidInput.disabled = false;
                wifiPassInput.disabled = false;
                sendWifiBtn.disabled = false;
                readStatusBtn.disabled = false;
                readDevIdBtn.disabled = false;
                
                connectBtn.textContent = "Connected";
                connectBtn.disabled = true;

            } catch (error) {
                console.error("BLE Handshake Failure:", error);
                updateStatus(`Error: ${error.message}`);
                setUiAccent("#f56565"); // red
            }
        });

        // Trigger Writes for Configuration
        sendWifiBtn.addEventListener('click', async () => {
            const ssidValue = wifiSsidInput.value;
            const passValue = wifiPassInput.value;

            if(!ssidValue) {
                updateStatus("Validation Warning: SSID network name cannot be empty.");
                return;
            }

            try {
                const encoder = new TextEncoder();
                
                updateStatus("Writing Wi-Fi SSID payload...");
                await characteristicsMap['ssid'].writeValue(encoder.encode(ssidValue));

                updateStatus("Writing Wi-Fi Password payload...");
                await characteristicsMap['pass'].writeValue(encoder.encode(passValue));

                updateStatus("Configuration pushed successfully! Pi is processing.");
            } catch (error) {
                updateStatus(`Write operation failed: ${error.message}`);
            }
        });

        // Read Request handler for Device ID
        readDevIdBtn.addEventListener('click', async () => {
            try {
                updateStatus("Reading Device ID characteristic...");
                const valueBuffer = await characteristicsMap['devid'].readValue();
                const decoder = new TextDecoder('utf-8');
                const devIdString = decoder.decode(valueBuffer);
                
                devIdDisplay.textContent = `Device ID: ${devIdString}`;
                updateStatus("Device ID parsed successfully.");
            } catch (error) {
                updateStatus(`Failed reading Device ID: ${error.message}`);
            }
        });

        // Read Request handler for Connection Status
        readStatusBtn.addEventListener('click', async () => {
            try {
                updateStatus("Checking network interface status register...");
                const valueBuffer = await characteristicsMap['status'].readValue();
                const decoder = new TextDecoder('utf-8');
                const statusString = decoder.decode(valueBuffer);
                
                updateStatus(`Pi Reports Network Status: "${statusString}"`);
            } catch (error) {
                updateStatus(`Failed pulling connection status registers: ${error.message}`);
            }
        });

        // Helper Layout/Visual updates
        function updateStatus(message) { statusDiv.textContent = `Status: ${message}`; }
        function setUiAccent(color) { document.styleSheets[0].insertRule(`#status { border-left-color: ${color} !important; }`, 0); }
    </script>
</body>
</html>
